<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkanoid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        #gameContainer {
            position: relative;
        }

        #gameCanvas {
            border: 2px solid #e94560;
            border-radius: 4px;
            background: #16213e;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3), 0 0 60px rgba(233, 69, 96, 0.1);
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #pauseBtn {
            display: none;
            position: absolute;
            top: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            z-index: 10;
        }

        #guideLink {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: #556;
            font-size: 12px;
            font-family: monospace;
            text-decoration: none;
            transition: color 0.2s;
        }

        #guideLink:hover {
            color: #4cc9f0;
        }

        #introOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            touch-action: none;
        }

        #introOverlay.fade-out {
            animation: introFadeOut 0.8s ease forwards;
        }

        @keyframes introFadeOut {
            to { opacity: 0; pointer-events: none; }
        }

        #introCanvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="introOverlay">
        <canvas id="introCanvas"></canvas>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <button id="pauseBtn">⏸</button>
        <a id="guideLink" href="guide.html">❓ Player Guide</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
    <script src="intro.js"></script>
    <script src="game.js"></script>
</body>
</html>

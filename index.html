<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkanoid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        #gameContainer {
            position: relative;
        }

        #gameCanvas {
            border: 2px solid #e94560;
            border-radius: 4px;
            background: #16213e;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3), 0 0 60px rgba(233, 69, 96, 0.1);
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #pauseBtn {
            display: none;
            position: absolute;
            top: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            z-index: 10;
        }

        #guideLink {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: #556;
            font-size: 12px;
            font-family: monospace;
            text-decoration: none;
            transition: color 0.2s;
        }

        #guideLink:hover {
            color: #4cc9f0;
        }

        #introOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            touch-action: none;
        }

        #introOverlay.fade-out {
            animation: introFadeOut 0.8s ease forwards;
        }

        @keyframes introFadeOut {
            to { opacity: 0; pointer-events: none; }
        }

        #introCanvas {
            width: 100%;
            height: 100%;
        }

        /* --- Multiplayer Lobby --- */
        #mpLobby {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 90;
            background: rgba(10, 10, 26, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
            color: #e0e0f0;
            font-family: monospace;
        }

        #mpLobby h2 {
            font-size: 28px;
            color: #4cc9f0;
            margin-bottom: 8px;
        }

        #mpLobby button {
            background: #1e1e3e;
            border: 1px solid #4cc9f0;
            color: #4cc9f0;
            font-family: monospace;
            font-size: 15px;
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #mpLobby button:hover {
            background: #4cc9f0;
            color: #0a0a1a;
        }

        #mpLobby input {
            background: #1e1e3e;
            border: 1px solid #2a2a4a;
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            padding: 8px 14px;
            border-radius: 6px;
            text-align: center;
            width: 120px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        #mpCodeDisplay {
            display: none;
            font-size: 36px;
            font-weight: bold;
            color: #f1fa8c;
            letter-spacing: 8px;
            margin: 8px 0;
        }

        #mpStatus {
            font-size: 14px;
            color: #8892b0;
            min-height: 20px;
        }

        #mpReadyBtn {
            display: none;
            background: #50fa7b !important;
            border-color: #50fa7b !important;
            color: #0a0a1a !important;
            font-size: 18px !important;
            padding: 12px 40px !important;
        }

        #mpBackBtn {
            margin-top: 12px;
            font-size: 12px !important;
            border-color: #556 !important;
            color: #556 !important;
        }

        .mp-join-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #mpModeBtn {
            position: absolute;
            bottom: -30px;
            right: 0;
            color: #556;
            font-size: 12px;
            font-family: monospace;
            text-decoration: none;
            background: none;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #mpModeBtn:hover {
            color: #f5a623;
            border-color: #f5a623;
        }
    </style>
</head>
<body>
    <div id="introOverlay">
        <canvas id="introCanvas"></canvas>
    </div>

    <div id="mpLobby">
        <h2>⚡ MULTIPLAYER</h2>
        <button id="mpCreateBtn">Create Room</button>
        <div style="color:#556; font-size:12px;">— or —</div>
        <div class="mp-join-row">
            <input id="mpCodeInput" maxlength="4" placeholder="CODE">
            <button id="mpJoinBtn">Join</button>
        </div>
        <div id="mpCodeDisplay"></div>
        <div id="mpStatus"></div>
        <button id="mpReadyBtn">READY</button>
        <button id="mpBackBtn">← Back to Solo</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <button id="pauseBtn">⏸</button>
        <a id="guideLink" href="guide.html">❓ Player Guide</a>
        <button id="mpModeBtn">⚡ Multiplayer</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
    <script src="multiplayer.js"></script>
    <script src="intro.js"></script>
    <script src="game.js"></script>
</body>
</html>
